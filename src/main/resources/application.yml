server:
  port: 5500

spring:
  application:
    name: card-transfer-service

  datasource:
    url: jdbc:h2:mem:transferdb;DB_CLOSE_DELAY=-1;MODE=PostgreSQL;DB_CLOSE_ON_EXIT=FALSE
    driver-class-name: org.h2.Driver
    username: sa
    password:

  jpa:
    database-platform: org.hibernate.dialect.H2Dialect
    hibernate:
      ddl-auto: create-drop
    show-sql: false
    properties:
      hibernate:
        format_sql: true

  h2:
    console:
      enabled: true
      path: /h2-console

transfer:
  log:
    operations-file: ${TRANSFER_LOG_FILE:deploy/transfer.log}

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics